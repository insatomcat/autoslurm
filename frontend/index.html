<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Autoslurm UI</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Autoslurm</h1>

      <section class="card">
        <h2>Commande cluster</h2>
        <div class="row">
          <label for="createTargetNodes">target_nodes</label>
          <input id="createTargetNodes" type="number" min="1" value="1" />
        </div>
        <label class="inline" for="colocateFirstCompute">
          <input id="colocateFirstCompute" type="checkbox" />
          Controller + 1er compute sur la meme VM
        </label>
        <div class="buttons">
          <button id="createBtn">Creer / Mettre a jour</button>
          <button id="destroyBtn" class="danger">Detruire</button>
        </div>
      </section>

      <section class="card">
        <div class="header-line">
          <h2>Etat cluster</h2>
          <button id="refreshBtn">Rafraichir</button>
        </div>
        <div id="statusBadge" class="badge">inconnu</div>
        <div class="summary-grid">
          <div><strong>Nodes:</strong> <span id="nodesSummary">-</span></div>
          <div><strong>Controller:</strong> <span id="controllerSummary">-</span></div>
          <div><strong>Derniere action:</strong> <span id="operationSummary">-</span></div>
          <div><strong>Auto-refresh:</strong> <span id="refreshSummary">toutes les 2s</span></div>
        </div>
        <div>
          <strong>IPs:</strong>
          <span id="ipsSummary">-</span>
        </div>
      </section>

      <section class="card">
        <h2>Logs continus</h2>
        <pre id="logsWindow">Aucun log.</pre>
      </section>
    </main>
    <script src="./main.js"></script>
  </body>
</html>
