<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Autoslurm UI</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Autoslurm</h1>

      <section class="card">
        <h2>Cluster</h2>
        <label for="createTargetNodes">target_nodes</label>
        <input id="createTargetNodes" type="number" min="1" value="1" />
        <label for="colocateFirstCompute">
          <input id="colocateFirstCompute" type="checkbox" />
          Controller + 1er compute sur la meme VM
        </label>
        <button id="createBtn">Creer/Mettre a jour cluster</button>
        <button id="destroyBtn">Detruire cluster</button>
        <pre id="clusterLifecycleResponse">Aucune operation.</pre>
      </section>

      <section class="card">
        <h2>Etat du cluster</h2>
        <button id="refreshBtn">Rafraichir</button>
        <pre id="clusterState">Aucun etat charge.</pre>
      </section>
    </main>
    <script src="./main.js"></script>
  </body>
</html>
