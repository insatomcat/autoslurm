- name: Install slurm controller packages
  ansible.builtin.apt:
    name:
      - slurmctld
      - slurm-wlm-basic-plugins
      - nfs-kernel-server
    state: present
    update_cache: true

- name: Ensure slurm state directory exists
  ansible.builtin.file:
    path: "{{ slurm_state_save_location }}"
    state: directory
    owner: slurm
    group: slurm
    mode: "0755"

- name: Render slurm.conf on controller
  ansible.builtin.template:
    src: slurm.conf.j2
    dest: /etc/slurm/slurm.conf
    owner: root
    group: root
    mode: "0644"

- name: Configure NFS export for shared home
  ansible.builtin.lineinfile:
    path: /etc/exports
    regexp: "^{{ nfs_export_path }}\\s+"
    line: "{{ nfs_export_path }} {{ nfs_allowed_network }}({{ nfs_export_options }})"
    create: true
    mode: "0644"

- name: Apply NFS exports
  ansible.builtin.command: exportfs -ra
  changed_when: false

- name: Enable NFS server
  ansible.builtin.systemd:
    name: nfs-server
    enabled: true
    state: started

- name: Enable slurmctld
  ansible.builtin.systemd:
    name: slurmctld
    enabled: true
    state: restarted
