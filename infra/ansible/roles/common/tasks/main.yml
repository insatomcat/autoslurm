- name: Install base packages
  ansible.builtin.apt:
    name:
      - curl
      - git
      - python3
      - python3-apt
      - munge
      - slurm-client
    state: present
    update_cache: true

- name: Ensure Munge is enabled
  ansible.builtin.systemd:
    name: munge
    state: started
    enabled: true
